<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Whiteboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="controls">
    <div id="strokeControls">
      <label>Stroke Color <input type="color" id="color" value="#000000"></label>
      <label>Size <input id="size" type="range" min="1" max="30" value="4"></label>
      <label>Brush:
        <select id="brush">
          <option value="solid">Solid</option>
          <option value="dotted">Dotted</option>
          <option value="dashed">Dashed</option>
          <option value="spray">Spray</option>
        </select>
      </label>
    </div>

    <div id="fillControls">
      <label><input type="checkbox" id="useFill"> Fill</label>
      <label>Fill Color <input type="color" id="fillColor" value="#FF0000" disabled></label>
    </div>

    <div id="shapeControls">
      <label>Shape:
        <select id="shape">
          <option value="pen">Pen</option>
          <option value="line">Line</option>
          <option value="rectangle">Rectangle</option>
          <option value="circle">Circle</option>
          <option value="triangle">Triangle</option>
        </select>
      </label>
    </div>

    <div>
      <button id="clear">Clear</button>
      <button id="save">Save</button>
    </div>
  </div>

  <canvas id="board"></canvas>

  <div id="gallery">
    <h3>Saved Images</h3>
    <div id="images"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
